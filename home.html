<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Earning Platform</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh; display: flex; justify-content: center; align-items: center; color: white;
        }
        .app-container {
            width: 100%; max-width: 400px; min-height: 100vh;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            box-shadow: 0 0 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            padding: 20px; display: flex; flex-direction: column; gap: 20px;
            animation: fadeIn 0.8s ease-in-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Header Section */
        .header { text-align: center; margin-top: 10px; }
        .header h2 { font-size: 24px; color: #00d2ff; }
        .status-badge {
            display: inline-block; margin-top: 5px; padding: 5px 15px; border-radius: 20px;
            font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;
        }
        .status-active { background: rgba(0, 255, 100, 0.2); color: #00ff88; border: 1px solid #00ff88; }
        .status-unactive { background: rgba(255, 0, 50, 0.2); color: #ff4d4d; border: 1px solid #ff4d4d; }
        
        /* Notice Section */
        .notice-box {
            background: rgba(255, 165, 0, 0.2); border-left: 4px solid orange;
            padding: 12px; border-radius: 8px; font-size: 13px; color: #ffd700;
            display: flex; align-items: center; gap: 10px; line-height: 1.4;
        }
        .notice-box i { font-size: 20px; }

        /* Stats Section */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-card {
            background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px;
            text-align: center; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.15); }
        .stat-card i { font-size: 25px; color: #00d2ff; margin-bottom: 10px; }
        .stat-card h3 { font-size: 22px; margin-bottom: 5px; }
        .stat-card p { font-size: 12px; color: #ccc; }

        /* Actions Section */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .action-btn {
            background: linear-gradient(to right, #3a7bd5, #3a6073); border: none; padding: 15px;
            border-radius: 15px; color: white; font-size: 14px; font-weight: bold;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .action-btn i { font-size: 22px; }
        .action-btn:hover { background: linear-gradient(to right, #00d2ff, #3a7bd5); transform: scale(1.05); }

        .logout-btn {
            background: transparent; border: 1px solid #ff4d4d; color: #ff4d4d;
            padding: 10px; border-radius: 10px; text-align: center; cursor: pointer;
            margin-top: auto; font-weight: bold; transition: 0.3s;
        }
        .logout-btn:hover { background: #ff4d4d; color: white; }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Header -->
    <div class="header">
        <h2>Hi, <span id="userName">User</span>!</h2>
        <div id="accStatus" class="status-badge status-unactive">Unactive</div>
    </div>

    <!-- Notice -->
    <div class="notice-box" id="noticeBox">
        <i class="fas fa-bullhorn"></i>
        <span id="noticeText">Loading notice...</span>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
        <div class="stat-card">
            <i class="fas fa-wallet"></i>
            <h3 id="userBalance">0 ৳</h3>
            <p>Total Balance</p>
        </div>
        <div class="stat-card">
            <i class="fas fa-users"></i>
            <h3 id="activeRefs">0</h3>
            <p>Active Referrals</p>
        </div>
    </div>
    
    <!-- Salary Level Indicator (Requested in features) -->
    <div style="text-align: center; font-size: 14px; color: #00d2ff; margin-top: -5px;">
        <i class="fas fa-star"></i> Current Salary Level: <strong id="salaryLevel">0</strong>
    </div>

    <!-- Action Buttons -->
    <div class="action-grid">
        <button class="action-btn" onclick="location.href='task.html'">
            <i class="fas fa-tasks"></i> Daily Tasks
        </button>
        <button class="action-btn" onclick="location.href='referral.html'">
            <i class="fas fa-share-alt"></i> Referral
        </button>
        <button class="action-btn" onclick="location.href='selery.html'">
            <i class="fas fa-gift"></i> Monthly Salary
        </button>
        <button class="action-btn" onclick="location.href='withdraw.html'">
            <i class="fas fa-hand-holding-usd"></i> Withdraw
        </button>
    </div>

    <!-- Logout -->
    <button class="logout-btn" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Logout
    </button>
</div>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyB9atiIYLHR_0-2pVhq5olkEzFLCk4t_p4",
        authDomain: "fir-f4489.firebaseapp.com",
        projectId: "fir-f4489",
        storageBucket: "fir-f4489.firebasestorage.app",
        messagingSenderId: "641154105850",
        appId: "1:641154105850:web:c0525183fcc96b5e9d6443"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Check Login Session
    const loggedInUser = sessionStorage.getItem("loggedInUser");
    if(!loggedInUser) {
        window.location.href = "index.html";
    }

    // Fetch User Data Real-time
    db.ref("users/" + loggedInUser).on("value", snapshot => {
        if(snapshot.exists()) {
            let user = snapshot.val();
            
            // Auto Account Activation Logic (3 Tasks = Active)
            if (user.completed_tasks >= 3 && user.status !== "active") {
                db.ref("users/" + loggedInUser).update({ status: "active" });
                user.status = "active"; // Update local variable instantly for UI
            }

            // Update UI Elements
            document.getElementById("userName").innerText = user.name;
            document.getElementById("userBalance").innerText = user.balance + " ৳";
            document.getElementById("activeRefs").innerText = user.active_referral_count;
            document.getElementById("salaryLevel").innerText = user.salary_level || "0";

            let statusBadge = document.getElementById("accStatus");
            let noticeText = document.getElementById("noticeText");
            let noticeBox = document.getElementById("noticeBox");

            if(user.status === "active") {
                statusBadge.innerText = "ACTIVE";
                statusBadge.className = "status-badge status-active";
                
                noticeBox.style.background = "rgba(0, 255, 100, 0.2)";
                noticeBox.style.borderLeft = "4px solid #00ff88";
                noticeBox.style.color = "#00ff88";
                noticeText.innerHTML = "<b>Congratulations!</b> Your account is active. You can now choose a salary and withdraw funds.";
            } else {
                statusBadge.innerText = "UNACTIVE";
                statusBadge.className = "status-badge status-unactive";
                
                let tasksNeeded = 3 - (user.completed_tasks || 0);
                noticeText.innerHTML = `Complete <b>${tasksNeeded} more tasks</b> to activate your account! Account activation is required for Withdraw & Salary.`;
            }
        } else {
            alert("User data not found! Please login again.");
            logout();
        }
    });

    function logout() {
        sessionStorage.removeItem("loggedInUser");
        window.location.href = "index.html";
    }
</script>
</body>
</html>
