<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Earning Platform</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); min-height: 100vh; display: flex; justify-content: center; align-items: center; color: white; }
        .app-container {
            width: 100%; max-width: 400px; min-height: 100vh;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            box-shadow: 0 0 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            padding: 20px; display: flex; flex-direction: column; gap: 20px;
            animation: fadeIn 0.8s ease-in-out; position: relative; overflow: hidden;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Header Section */
        .header { text-align: center; margin-top: 10px; }
        .header h2 { font-size: 24px; color: #00d2ff; }
        .status-badge { display: inline-block; margin-top: 5px; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .status-active { background: rgba(0, 255, 100, 0.2); color: #00ff88; border: 1px solid #00ff88; }
        .status-unactive { background: rgba(255, 0, 50, 0.2); color: #ff4d4d; border: 1px solid #ff4d4d; }
        
        /* Notice Section */
        .notice-box { background: rgba(255, 165, 0, 0.2); border-left: 4px solid orange; padding: 12px; border-radius: 8px; font-size: 13px; color: #ffd700; display: flex; align-items: center; gap: 10px; line-height: 1.4; transition: 0.3s; }
        .notice-box i { font-size: 20px; }

        /* Stats Section */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-card { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .stat-card i { font-size: 25px; color: #00d2ff; margin-bottom: 10px; }
        .stat-card h3 { font-size: 22px; margin-bottom: 5px; transition: 0.5s; }
        .stat-card p { font-size: 12px; color: #ccc; }

        /* Action Buttons */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .action-btn {
            background: linear-gradient(to right, #3a7bd5, #3a6073); border: none; padding: 15px;
            border-radius: 15px; color: white; font-size: 14px; font-weight: bold;
            display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .action-btn i { font-size: 22px; }
        .action-btn:hover { background: linear-gradient(to right, #00d2ff, #3a7bd5); transform: scale(1.05); }

        .logout-btn { background: transparent; border: 1px solid #ff4d4d; color: #ff4d4d; padding: 10px; border-radius: 10px; text-align: center; cursor: pointer; margin-top: auto; font-weight: bold; transition: 0.3s; }
        .logout-btn:hover { background: #ff4d4d; color: white; }

        /* =========================================
           BONUS MODAL (PREMIUM ANIMATION)
           ========================================= */
        .bonus-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 32, 39, 0.9); backdrop-filter: blur(8px);
            z-index: 1000; display: none; justify-content: center; align-items: center;
        }
        .bonus-card {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 140, 0, 0.2));
            border: 1px solid #ffd700; border-radius: 20px; padding: 30px 20px;
            width: 90%; max-width: 320px; text-align: center;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.5);
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        .bonus-icon { font-size: 70px; color: #ffd700; text-shadow: 0 0 20px #ffd700; margin-bottom: 10px; animation: tada 1.5s infinite; }
        @keyframes tada { 
            0% {transform: scale(1);} 10%, 20% {transform: scale(0.9) rotate(-3deg);} 
            30%, 50%, 70%, 90% {transform: scale(1.1) rotate(3deg);} 
            40%, 60%, 80% {transform: scale(1.1) rotate(-3deg);} 100% {transform: scale(1);} 
        }

        .bonus-card h1 { color: white; font-size: 22px; margin-bottom: 5px; }
        .bonus-amount { font-size: 40px; font-weight: bold; color: #00ff88; text-shadow: 0 0 15px rgba(0,255,136,0.6); margin: 10px 0; }
        .bonus-msg { font-size: 13px; color: #ddd; margin-bottom: 20px; }

        .btn-claim {
            background: linear-gradient(to right, #00ff88, #00b35c); color: #0f2027; border: none;
            padding: 12px 30px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.6); transition: 0.3s; width: 100%;
        }
        .btn-claim:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(0, 255, 136, 0.8); }

    </style>
</head>
<body>

<div class="app-container">
    <!-- Header -->
    <div class="header">
        <h2>Hi, <span id="userName">User</span>!</h2>
        <div id="accStatus" class="status-badge status-unactive">Unactive</div>
    </div>

    <!-- Notice Box -->
    <div class="notice-box" id="noticeBox">
        <i class="fas fa-bullhorn"></i>
        <span id="noticeText">Loading notice...</span>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
        <div class="stat-card">
            <i class="fas fa-wallet"></i>
            <h3 id="userBalance">0 ৳</h3>
            <p>Total Balance</p>
        </div>
        <div class="stat-card">
            <i class="fas fa-users"></i>
            <h3 id="activeRefs">0</h3>
            <p>Active Referrals</p>
        </div>
    </div>
    
    <div style="text-align: center; font-size: 14px; color: #00d2ff; margin-top: -5px;">
        <i class="fas fa-star"></i> Current Salary Level: <strong id="salaryLevel">0</strong>
    </div>

    <!-- Actions -->
    <div class="action-grid">
        <button class="action-btn" onclick="location.href='task.html'"><i class="fas fa-tasks"></i> Daily Tasks</button>
        <button class="action-btn" onclick="location.href='referral.html'"><i class="fas fa-share-alt"></i> Referral</button>
        <button class="action-btn" onclick="location.href='selery.html'"><i class="fas fa-gift"></i> Monthly Salary</button>
        <button class="action-btn" onclick="location.href='withdraw.html'"><i class="fas fa-hand-holding-usd"></i> Withdraw</button>
    </div>

    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>

    <!-- =====================================
         BONUS POPUP MODAL
         ===================================== -->
    <div class="bonus-overlay" id="bonusOverlay">
        <div class="bonus-card">
            <div class="bonus-icon"><i class="fas fa-gift"></i></div>
            <h1>Congratulations!</h1>
            <p class="bonus-msg" id="bonusMessage">You have received a special gift.</p>
            <div class="bonus-amount" id="bonusAmountText">+0 ৳</div>
            <button class="btn-claim" onclick="claimBonus()">Claim Now</button>
        </div>
    </div>

</div>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyB9atiIYLHR_0-2pVhq5olkEzFLCk4t_p4",
        authDomain: "fir-f4489.firebaseapp.com",
        projectId: "fir-f4489",
        storageBucket: "fir-f4489.firebasestorage.app",
        messagingSenderId: "641154105850",
        appId: "1:641154105850:web:c0525183fcc96b5e9d6443"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const loggedInUser = sessionStorage.getItem("loggedInUser");
    if(!loggedInUser) window.location.href = "index.html";

    let currentBalance = 0;
    let pendingBonusAmount = 0;

    // Fetch User Data from Firebase
    db.ref("users/" + loggedInUser).on("value", snapshot => {
        if(snapshot.exists()) {
            let user = snapshot.val();
            currentBalance = user.balance || 0;
            
            // Auto Account Activation check
            if (user.completed_tasks >= 3 && user.status !== "active") {
                db.ref("users/" + loggedInUser).update({ status: "active" });
                user.status = "active"; 
            }

            // Update UI
            document.getElementById("userName").innerText = user.name;
            document.getElementById("userBalance").innerText = currentBalance + " ৳";
            document.getElementById("activeRefs").innerText = user.active_referral_count || 0;
            document.getElementById("salaryLevel").innerText = user.salary_level || "0";

            let statusBadge = document.getElementById("accStatus");
            let noticeText = document.getElementById("noticeText");
            let noticeBox = document.getElementById("noticeBox");

            // Handle Active/Unactive Notice dynamically
            if(user.status === "active") {
                statusBadge.innerText = "ACTIVE";
                statusBadge.className = "status-badge status-active";
                
                noticeBox.style.background = "rgba(0, 255, 100, 0.2)";
                noticeBox.style.borderLeft = "4px solid #00ff88";
                noticeBox.style.color = "#00ff88";
                noticeText.innerHTML = "<b>Congratulations!</b> Your account is active. You can now choose a salary and withdraw funds.";
            } else {
                statusBadge.innerText = "UNACTIVE";
                statusBadge.className = "status-badge status-unactive";
                
                noticeBox.style.background = "rgba(255, 165, 0, 0.2)";
                noticeBox.style.borderLeft = "4px solid orange";
                noticeBox.style.color = "#ffd700";
                
                let tasksNeeded = 3 - (user.completed_tasks || 0);
                noticeText.innerHTML = `Complete <b>${tasksNeeded} more tasks</b> to activate your account!`;
            }

            // ===================================
            // CHECK FOR PENDING BONUS
            // ===================================
            if (user.pending_bonus) {
                pendingBonusAmount = user.pending_bonus.amount;
                document.getElementById("bonusMessage").innerText = user.pending_bonus.message;
                document.getElementById("bonusAmountText").innerText = "+" + pendingBonusAmount + " ৳";
                
                // Show Popup smoothly
                document.getElementById("bonusOverlay").style.display = "flex";
            } else {
                // Hide popup if no bonus exists
                document.getElementById("bonusOverlay").style.display = "none";
            }
        }
    });

    // ===================================
    // CLAIM BONUS FUNCTION
    // ===================================
    function claimBonus() {
        if (pendingBonusAmount > 0) {
            let newBalance = currentBalance + pendingBonusAmount;

            // Add balance and remove pending_bonus node from Database
            db.ref("users/" + loggedInUser).update({
                balance: newBalance,
                pending_bonus: null
            }).then(() => {
                alert("Awesome! Bonus claimed successfully.");
            });
        }
    }

    function logout() {
        sessionStorage.removeItem("loggedInUser");
        window.location.href = "index.html";
    }
</script>
</body>
</html>
