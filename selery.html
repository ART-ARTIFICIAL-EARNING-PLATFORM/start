<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Salary - Earning Platform</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh; color: white; padding: 20px; padding-bottom: 50px;
        }
        .header { display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 30px; margin-top: 10px; }
        .back-btn { position: absolute; left: 0; font-size: 22px; cursor: pointer; color: white; transition: 0.3s; }
        .back-btn:hover { color: #00d2ff; }
        .header h2 { font-size: 22px; color: #00d2ff; text-shadow: 0 0 10px rgba(0, 210, 255, 0.3); }

        /* Unactive Overlay */
        #unactiveOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 32, 39, 0.9); backdrop-filter: blur(5px); z-index: 100;
            flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
        }
        #unactiveOverlay i { font-size: 60px; color: #ff4d4d; margin-bottom: 15px; }
        #unactiveOverlay h3 { color: white; margin-bottom: 10px; }
        #unactiveOverlay p { color: #ccc; font-size: 14px; margin-bottom: 20px; }
        .go-home-btn { background: #00d2ff; color: #0f2027; padding: 10px 20px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }

        /* Level Cards */
        .levels-grid { display: grid; grid-template-columns: 1fr; gap: 15px; max-width: 500px; margin: 0 auto; }
        
        .level-card {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; padding: 20px; transition: 0.3s; position: relative; overflow: hidden;
        }
        
        /* Card States */
        .card-available { border-left: 5px solid #00d2ff; }
        .card-active { border-left: 5px solid #ff9900; background: rgba(255, 153, 0, 0.1); box-shadow: 0 0 15px rgba(255, 153, 0, 0.3); }
        .card-completed { border-left: 5px solid #00ff88; opacity: 0.7; }
        .card-locked { border-left: 5px solid #555; opacity: 0.5; filter: grayscale(100%); pointer-events: none; }

        .level-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .level-header h3 { font-size: 18px; color: white; }
        .reward { background: rgba(0, 210, 255, 0.2); color: #00d2ff; padding: 5px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; }

        .target-info { font-size: 13px; color: #ddd; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .target-info i { color: #ff9900; }

        /* Progress Bar for Active Mission */
        .progress-container { width: 100%; background: rgba(255,255,255,0.1); border-radius: 10px; height: 8px; margin-bottom: 15px; display: none; }
        .progress-bar { height: 100%; background: #ff9900; border-radius: 10px; width: 0%; transition: 0.5s; }
        .progress-text { font-size: 11px; text-align: right; color: #aaa; margin-top: -10px; margin-bottom: 10px; display: none; }

        .btn { width: 100%; padding: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; }
        
        /* Button States */
        .btn-select { background: #00d2ff; color: #0f2027; }
        .btn-select:hover { background: white; }
        .btn-progress { background: transparent; border: 1px solid #ff9900; color: #ff9900; cursor: not-allowed; }
        .btn-claim { background: #00ff88; color: #0f2027; box-shadow: 0 0 15px rgba(0, 255, 136, 0.5); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        .btn-completed { background: rgba(255,255,255,0.1); color: #aaa; cursor: not-allowed; }

    </style>
</head>
<body>

<div class="header">
    <i class="fas fa-arrow-left back-btn" onclick="location.href='home.html'"></i>
    <h2>Salary Missions</h2>
</div>

<!-- Lock Screen for Unactive Users -->
<div id="unactiveOverlay">
    <i class="fas fa-lock"></i>
    <h3>Account Unactive!</h3>
    <p>You must complete 3 tasks and activate your account to choose a salary mission.</p>
    <button class="go-home-btn" onclick="location.href='task.html'">Go to Tasks</button>
</div>

<!-- Levels Container -->
<div class="levels-grid" id="levelsContainer">
    <!-- Levels will be injected here by JS -->
</div>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyB9atiIYLHR_0-2pVhq5olkEzFLCk4t_p4",
        authDomain: "fir-f4489.firebaseapp.com",
        projectId: "fir-f4489",
        storageBucket: "fir-f4489.firebasestorage.app",
        messagingSenderId: "641154105850",
        appId: "1:641154105850:web:c0525183fcc96b5e9d6443"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const loggedInUser = sessionStorage.getItem("loggedInUser");
    if(!loggedInUser) window.location.href = "index.html";

    // Defining the 10 Salary Levels
    const salaryLevels = [
        { id: 1, refs: 15, reward: 1000 },
        { id: 2, refs: 25, reward: 1800 },
        { id: 3, refs: 35, reward: 3000 },
        { id: 4, refs: 45, reward: 4500 },
        { id: 5, refs: 55, reward: 6500 },
        { id: 6, refs: 65, reward: 9000 },
        { id: 7, refs: 75, reward: 12000 },
        { id: 8, refs: 85, reward: 15500 },
        { id: 9, refs: 95, reward: 19500 },
        { id: 10, refs: 105, reward: 24000 }
    ];

    let userData = {};

    // Listen to Realtime Data
    db.ref("users/" + loggedInUser).on("value", snapshot => {
        if(snapshot.exists()) {
            userData = snapshot.val();
            
            // Check Activation Status
            if(userData.status !== "active") {
                document.getElementById("unactiveOverlay").style.display = "flex";
                return;
            } else {
                document.getElementById("unactiveOverlay").style.display = "none";
            }

            renderLevels();
        }
    });

    function renderLevels() {
        const container = document.getElementById("levelsContainer");
        container.innerHTML = "";

        let currentActiveMission = userData.current_salary_mission || 0;
        let completedMissions = userData.completed_salary_levels ? userData.completed_salary_levels.split(",") : [];
        let activeRefsCount = userData.active_referral_count || 0;

        // Reset Logic Check
        if(completedMissions.length === 10) {
            alert("Congratulations! You have completed all 10 levels. The cycle is resetting!");
            db.ref("users/" + loggedInUser).update({
                completed_salary_levels: "",
                current_salary_mission: 0
            });
            return; // Will re-render automatically due to .on listener
        }

        salaryLevels.forEach(level => {
            let isCompleted = completedMissions.includes(level.id.toString());
            let isActive = (currentActiveMission === level.id);
            let isLocked = (!isActive && currentActiveMission !== 0 && !isCompleted);

            let cardClass = "card-available";
            let btnHTML = `<button class="btn btn-select" onclick="selectMission(${level.id})">Select Mission</button>`;
            let progressHTML = "";

            if (isCompleted) {
                cardClass = "card-completed";
                btnHTML = `<button class="btn btn-completed" disabled><i class="fas fa-check-circle"></i> Completed</button>`;
            } else if (isActive) {
                cardClass = "card-active";
                let percent = Math.min((activeRefsCount / level.refs) * 100, 100);
                
                progressHTML = `
                    <div class="progress-container" style="display:block;">
                        <div class="progress-bar" style="width: ${percent}%"></div>
                    </div>
                    <div class="progress-text" style="display:block;">${activeRefsCount} / ${level.refs} Active Refs</div>
                `;

                if (activeRefsCount >= level.refs) {
                    btnHTML = `<button class="btn btn-claim" onclick="claimReward(${level.id}, ${level.reward})">🎉 Claim ${level.reward} ৳</button>`;
                } else {
                    btnHTML = `<button class="btn btn-progress" disabled><i class="fas fa-spinner fa-spin"></i> In Progress</button>`;
                }
            } else if (isLocked) {
                cardClass = "card-locked";
                btnHTML = `<button class="btn btn-completed" disabled><i class="fas fa-lock"></i> Locked</button>`;
            }

            let card = `
                <div class="level-card ${cardClass}">
                    <div class="level-header">
                        <h3>Level ${level.id}</h3>
                        <div class="reward">${level.reward} ৳</div>
                    </div>
                    <div class="target-info">
                        <i class="fas fa-user-plus"></i> Target: ${level.refs} Active Referrals
                    </div>
                    ${progressHTML}
                    ${btnHTML}
                </div>
            `;
            container.innerHTML += card;
        });
    }

    function selectMission(levelId) {
        if(confirm(`Are you sure you want to select Level ${levelId} as your active mission? You cannot choose another until this is completed.`)) {
            db.ref("users/" + loggedInUser).update({
                current_salary_mission: levelId,
                salary_level: levelId // To show in home.html
            });
        }
    }

    function claimReward(levelId, rewardAmount) {
        let currentBalance = userData.balance || 0;
        let completedStr = userData.completed_salary_levels || "";
        
        let newCompletedStr = completedStr ? (completedStr + "," + levelId) : levelId.toString();

        db.ref("users/" + loggedInUser).update({
            balance: currentBalance + rewardAmount,
            current_salary_mission: 0,
            completed_salary_levels: newCompletedStr,
            salary_level: "Completed Lvl " + levelId
        }).then(() => {
            alert(`Awesome! You have claimed ${rewardAmount} ৳. You can now select a new mission.`);
        });
    }
</script>
</body>
</html>
